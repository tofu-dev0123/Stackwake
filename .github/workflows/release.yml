name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing (OIDC) and provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # No registry-url: it would write an .npmrc with an (empty) auth token and
      # force token auth, preventing Trusted Publishing (OIDC) from taking over.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      # Trusted Publishing (tokenless OIDC) requires a recent npm CLI.
      - name: Update npm
        run: npm install -g npm@latest

      - run: npm ci

      # Guard: the git tag (vX.Y.Z) must match the version in package.json.
      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package.json version $PKG" >&2
            exit 1
          fi

      - run: npm run build

      # No NODE_AUTH_TOKEN needed: Trusted Publishing authenticates via OIDC.
      - run: npm publish --provenance --access public
